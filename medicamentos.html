<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Medicamentos · CEM Esquina</title>
<style>
  :root {
    --verde: #2e7d32;
    --verde-claro: #e8f5e9;
    --azul: #1565c0;
    --azul-claro: #e3f2fd;
    --rojo: #c62828;
    --rojo-claro: #ffebee;
    --naranja: #e65100;
    --gris: #f5f5f5;
    --borde: #ddd;
    --texto: #212121;
    --texto-sec: #666;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; color: var(--texto); font-size: 15px; }

  header {
    background: var(--verde);
    color: white;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 2px 4px rgba(0,0,0,.2);
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: 17px; font-weight: 600; }

  .tabs {
    display: flex;
    background: white;
    border-bottom: 2px solid var(--borde);
    position: sticky; top: 50px; z-index: 99;
  }
  .tab-btn {
    flex: 1; padding: 12px 8px; border: none; background: none;
    cursor: pointer; font-size: 13px; font-weight: 500;
    color: var(--texto-sec); border-bottom: 3px solid transparent;
    margin-bottom: -2px; transition: all .2s;
  }
  .tab-btn.active { color: var(--verde); border-bottom-color: var(--verde); background: var(--verde-claro); }

  .tab-content { display: none; padding: 16px; max-width: 560px; margin: 0 auto; }
  .tab-content.active { display: block; }

  /* Config panel */
  .config-panel {
    background: white; border-radius: 10px; padding: 16px;
    border: 1px solid var(--borde); margin-bottom: 16px;
  }
  .config-panel summary { cursor: pointer; font-weight: 500; font-size: 14px; color: var(--texto-sec); }

  /* Cards / formularios */
  .card {
    background: white; border-radius: 10px; padding: 18px;
    border: 1px solid var(--borde); margin-bottom: 16px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  .card h2 { font-size: 15px; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

  label { display: block; font-size: 13px; font-weight: 500; color: var(--texto-sec); margin-bottom: 4px; margin-top: 12px; }
  label:first-child { margin-top: 0; }
  label .req { color: var(--rojo); }

  input[type=text], input[type=date], input[type=number], select, textarea {
    width: 100%; padding: 10px 12px; border: 1.5px solid var(--borde);
    border-radius: 7px; font-size: 14px; font-family: inherit;
    transition: border-color .2s; background: white; color: var(--texto);
  }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: var(--verde); box-shadow: 0 0 0 3px rgba(46,125,50,.1);
  }

  /* Autocomplete */
  .autocomplete-wrap { position: relative; }
  .autocomplete-list {
    position: absolute; top: 100%; left: 0; right: 0;
    background: white; border: 1.5px solid var(--verde);
    border-top: none; border-radius: 0 0 7px 7px;
    max-height: 200px; overflow-y: auto; z-index: 200;
    box-shadow: 0 4px 12px rgba(0,0,0,.12);
  }
  .autocomplete-list div {
    padding: 9px 12px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #f0f0f0;
  }
  .autocomplete-list div:hover { background: var(--verde-claro); }
  .autocomplete-list div strong { color: var(--verde); }
  .autocomplete-list .match-new {
    color: var(--naranja); font-style: italic; font-size: 12px;
  }

  /* Clave badge */
  .clave-badge {
    display: none; margin-top: 6px; padding: 6px 10px;
    background: var(--verde-claro); border: 1px solid #a5d6a7;
    border-radius: 6px; font-size: 12px; color: var(--verde);
  }
  .clave-badge.visible { display: flex; align-items: center; gap: 6px; }
  .clave-badge span { font-weight: 600; }

  .btn {
    width: 100%; padding: 13px; border: none; border-radius: 8px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    margin-top: 18px; transition: all .2s; display: flex;
    align-items: center; justify-content: center; gap: 8px;
  }
  .btn-verde { background: var(--verde); color: white; }
  .btn-verde:hover { background: #1b5e20; }
  .btn-azul { background: var(--azul); color: white; }
  .btn-azul:hover { background: #0d47a1; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  /* Toast */
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
    background: #212121; color: white; padding: 12px 20px;
    border-radius: 8px; font-size: 14px; transition: transform .3s;
    z-index: 999; max-width: 340px; text-align: center;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.ok { background: var(--verde); }
  .toast.err { background: var(--rojo); }

  /* Historial */
  .historial-item {
    background: var(--gris); border-radius: 8px; padding: 10px 12px;
    margin-bottom: 8px; font-size: 13px; border-left: 3px solid var(--verde);
  }
  .historial-item.salida { border-left-color: var(--azul); }
  .historial-item .meta { color: var(--texto-sec); font-size: 11px; margin-top: 4px; }

  /* REMEDIAR */
  .file-zone {
    border: 2px dashed var(--borde); border-radius: 10px;
    padding: 24px; text-align: center; cursor: pointer;
    transition: all .2s; color: var(--texto-sec);
  }
  .file-zone:hover { border-color: var(--verde); background: var(--verde-claro); }
  .file-zone input { display: none; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 12px; }
  th { background: var(--gris); padding: 8px 10px; text-align: left; font-weight: 500; }
  td { padding: 8px 10px; border-bottom: 1px solid #f0f0f0; }
  tr:hover td { background: #fafafa; }

  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 12px;
    font-size: 11px; font-weight: 500;
  }
  .badge-ok { background: var(--verde-claro); color: var(--verde); }
  .badge-warn { background: #fff3e0; color: var(--naranja); }
  .badge-err { background: var(--rojo-claro); color: var(--rojo); }

  .empty { text-align: center; color: var(--texto-sec); padding: 24px; font-size: 14px; }
  .btn-sm {
    padding: 6px 12px; font-size: 12px; border: 1px solid var(--borde);
    background: white; border-radius: 6px; cursor: pointer; margin-left: 8px;
  }
  .btn-sm:hover { background: var(--rojo-claro); border-color: var(--rojo); color: var(--rojo); }
</style>
</head>

  document.getElementById('e-fecha').value = hoy;
  document.getElementById('s-fecha').value = hoy;
  renderHistorial();

// ─── Medicamento select + autocomplete ───────────────────────
function onSelectMed(p) {
  const sel = document.getElementById(p + '-med-select').value;
  const wrap = document.getElementById(p + '-otro-wrap');
  const clave = document.getElementById(p + '-med-clave');
  if (sel === '__otro__') {
    wrap.style.display = 'block';
    clave.value = '';
  } else {
    wrap.style.display = 'none';
    clave.value = sel; // la clave = el mismo nombre del select
    document.getElementById(p + '-clave-badge').classList.remove('visible');
  }
}

function buscarMed(p, val) {
  const list = document.getElementById(p + '-ac-list');
  if (!val || val.length < 2) { list.style.display = 'none'; return; }
  const q = val.toLowerCase();

  // Buscar en claves canónicas
  const matches = MEDICAMENTOS_CLAVE.filter(m => m.toLowerCase().includes(q));

  // Buscar en sinónimos
  const clavesSugeridas = new Set();
  for (const [sin, clave] of Object.entries(SINONIMOS)) {
    if (sin.includes(q) || val.toLowerCase().includes(sin)) {
      clavesSugeridas.add(clave);
    }
  }

  list.innerHTML = '';
  let total = 0;

  clavesSugeridas.forEach(c => {
    if (total < 6) {
      const d = document.createElement('div');
      d.innerHTML = `<strong>🔗 ${c}</strong> <span style="color:#999;font-size:11px">— detectado como</span>`;
      d.onclick = () => seleccionarClave(p, val, c);
      list.appendChild(d);
      total++;
    }
  });

  matches.forEach(m => {
    if (!clavesSugeridas.has(m) && total < 8) {
      const d = document.createElement('div');
      d.textContent = m;
      d.onclick = () => seleccionarClave(p, m, m);
      list.appendChild(d);
      total++;
    }
  });

  if (total === 0) {
    const d = document.createElement('div');
    d.innerHTML = `<span class="match-new">Registrar "${val}" como medicamento nuevo</span>`;
    d.onclick = () => seleccionarClave(p, val, val);
    list.appendChild(d);
  }

  list.style.display = 'block';
}

function seleccionarClave(p, nombre, clave) {
  document.getElementById(p + '-med-otro').value = nombre;
  document.getElementById(p + '-med-clave').value = clave;
  document.getElementById(p + '-ac-list').style.display = 'none';
  const badge = document.getElementById(p + '-clave-badge');
  document.getElementById(p + '-clave-texto').textContent = clave;
  badge.classList.add('visible');
}

function limpiarClave(p) {
  document.getElementById(p + '-med-otro').value = '';
  document.getElementById(p + '-med-clave').value = '';
  document.getElementById(p + '-clave-badge').classList.remove('visible');
}

// Cerrar autocomplete al click fuera
document.addEventListener('click', e => {
  if (!e.target.closest('.autocomplete-wrap')) {
    document.querySelectorAll('.autocomplete-list').forEach(l => l.style.display = 'none');
  }
});

// ─── Obtener nombre de medicamento completo ───────────────────
function getMedNombre(p) {
  const sel = document.getElementById(p + '-med-select').value;
  if (sel && sel !== '__otro__') return sel;
  return document.getElementById(p + '-med-otro').value.trim();
}

function getMedClave(p) {
  const clave = document.getElementById(p + '-med-clave').value.trim();
  return clave || getMedNombre(p);
}

// ─── Validación ───────────────────────────────────────────────
function validar(campos) {
  for (const [id, label] of campos) {
    const el = document.getElementById(id);
    if (!el.value.trim()) {
      toast(`Completá: ${label}`, 'err');
      el.focus();
      return false;
    }
  }
  return true;
}

// ─── Enviar al Sheet via Apps Script ─────────────────────────
async function enviarAlSheet(params) {
  const url = 'https://script.google.com/macros/s/AKfycbzIZ_VlMiOOZFbVW8NJm3q4aehSbr2EkD2sfBiMCMoKjFgvsKSueFJnlaC31VXp7HOR/exec'; // URL fija del Apps Script
  if (!url) { toast('Configurá la URL del Apps Script', 'err'); return false; }
  try {
    const r = await fetch(url, {
      method: 'POST',
      body: JSON.stringify(params),
      headers: { 'Content-Type': 'application/json' }
    });
    return r.ok;
  } catch {
    // Intentar con GET como fallback (algunos deployments)
    try {
      const qs = new URLSearchParams(params).toString();
      await fetch(`${url}?${qs}`, { method: 'GET', mode: 'no-cors' });
      return true;
    } catch { return false; }
  }
}

// ─── Registrar ENTRADA ────────────────────────────────────────
async function registrarEntrada() {
  if (!validar([
    ['e-fecha','Fecha'], ['e-dep','Dependencia'],
    ['e-cantidad','Cantidad'], ['e-lote','N° de lote'],
    ['e-responsable','Responsable']
  ])) return;
  if (!getMedNombre('e')) { toast('Seleccioná o escribí un medicamento', 'err'); return; }

  const btn = document.getElementById('btn-entrada');
  btn.disabled = true; btn.textContent = 'Enviando...';

  const datos = {
    tipo: 'entrada',
    fecha: document.getElementById('e-fecha').value,
    dependencia: document.getElementById('e-dep').value,
    medicamento: getMedNombre('e'),
    medicamento_clave: getMedClave('e'),  // ← CAMPO NUEVO
    cantidad: document.getElementById('e-cantidad').value,
    vencimiento: document.getElementById('e-vencimiento').value,
    laboratorio: document.getElementById('e-laboratorio').value,
    lote: document.getElementById('e-lote').value,
    responsable: document.getElementById('e-responsable').value,
    timestamp: new Date().toLocaleString('es-AR')
  };

  const ok = await enviarAlSheet(datos);
  btn.disabled = false; btn.textContent = '📥 Registrar entrada';

  if (ok) {
    toast('✅ Entrada registrada', 'ok');
    guardarHistorial('entrada', datos);
    limpiarForm('e');
  } else {
    toast('Error al enviar. Revisá la URL de configuración.', 'err');
  }
}

// ─── Historial local ──────────────────────────────────────────
function guardarHistorial(tipo, datos) {
  const h = JSON.parse(localStorage.getItem('historial') || '[]');
  h.unshift({ tipo, ...datos });
  if (h.length > 50) h.pop();
  localStorage.setItem('historial', JSON.stringify(h));
  renderHistorial();
}

function renderHistorial() {
  const h = JSON.parse(localStorage.getItem('historial') || '[]');
  const el = document.getElementById('historial-lista');
  if (!h.length) { el.innerHTML = '<div class="empty">Sin registros aún</div>'; return; }
  el.innerHTML = h.slice(0, 10).map(r => `
    <div class="historial-item ${r.tipo}">
      <strong>${r.tipo === 'entrada' ? '📥' : '📤'} ${r.medicamento}</strong>
      ${r.medicamento_clave && r.medicamento_clave !== r.medicamento
        ? `<span style="color:#666;font-size:11px"> → ${r.medicamento_clave}</span>` : ''}
      — <span>${r.cantidad} unidades</span>
      <div class="meta">${r.dependencia} · ${r.fecha} · ${r.responsable || ''}</div>
    </div>`).join('');
}

function limpiarHistorial() {
  if (!confirm('¿Borrar el historial local?')) return;
  localStorage.removeItem('historial');
  renderHistorial();
  toast('Historial borrado', '');
}

function limpiarForm(p) {
  const hoy = new Date().toISOString().split('T')[0];
  document.getElementById(p + '-med-select').value = '';
  document.getElementById(p + '-otro-wrap').style.display = 'none';
  document.getElementById(p + '-med-clave').value = '';
  document.getElementById(p + '-cantidad').value = '';
  if (document.getElementById(p + '-fecha')) document.getElementById(p + '-fecha').value = hoy;
  if (document.getElementById(p + '-vencimiento')) document.getElementById(p + '-vencimiento').value = '';
  if (document.getElementById(p + '-laboratorio')) document.getElementById(p + '-laboratorio').value = '';
  if (document.getElementById(p + '-lote')) document.getElementById(p + '-lote').value = '';
}

// ─── Toast ────────────────────────────────────────────────────
function toast(msg, tipo) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (tipo || '');
  setTimeout(() => t.classList.remove('show'), 3000);
}
